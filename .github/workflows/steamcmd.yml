name: SteamCMD Puller

on:
  workflow_dispatch:   # lets you trigger it manually or via API

jobs:
  steamcmd:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/upload-artifact@v4

    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y lib32gcc-s1 curl

    - name: Install SteamCMD
      run: |
        mkdir -p ~/steamcmd
        cd ~/steamcmd
        curl -sSL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz | tar -xz

    - name: Run SteamCMD
      run: |
        mkdir -p output
        ~/steamcmd/steamcmd.sh +login anonymous +force_install_dir ./output +app_update 4551040 validate +quit

    - name: Upload output
      uses: actions/upload-artifact@v3
      with:
        name: steamcmd-output
        path: output
